<!DOCTYPE html>
<html lang="en" dir="ltr" class="font-latin">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Savoria - Experience the finest culinary artistry in an atmosphere of refined elegance" />
    <meta name="theme-color" content="#6d28d9" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Savoria - Fine Dining Restaurant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    <script>
      (function () {
        var theme =
          localStorage.getItem("savoria-theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        var lang = localStorage.getItem("savoria-lang") || "en";
        var root = document.documentElement;
        root.classList.add(theme);
        root.lang = lang;
        root.dir = lang === "ar" ? "rtl" : "ltr";
        root.classList.add(lang === "ar" ? "font-arabic" : "font-latin");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
